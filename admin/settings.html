<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网站设置 - 海西储能管理后台</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-sidebar-header">
        <div class="logo-icon">⚡</div>
        <div class="logo-text">海西储能<span>管理后台</span></div>
      </div>
      <nav class="admin-nav">
        <div class="admin-nav-section">
          <div class="admin-nav-section-title">主菜单</div>
          <a href="dashboard.html"><span class="nav-icon">📊</span> 仪表盘</a>
          <a href="products.html"><span class="nav-icon">📦</span> 产品管理</a>
          <a href="messages.html"><span class="nav-icon">💬</span> 留言管理 <span class="nav-badge" id="unreadBadge" style="display:none;">0</span></a>
          <a href="settings.html" class="active"><span class="nav-icon">⚙️</span> 网站设置</a>
        </div>
      </nav>
      <div class="admin-sidebar-footer">
        <a href="../index.html" class="back-to-site"><span>🌐</span> 返回前台网站</a>
        <a href="#" class="btn-logout"><span>🚪</span> 退出登录</a>
      </div>
    </aside>

    <div class="admin-main">
      <header class="admin-topbar">
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="menu-toggle-admin"><span></span><span></span><span></span></div>
          <span class="page-title">网站设置</span>
        </div>
        <div class="topbar-right">
          <div class="admin-user"><div class="admin-avatar">A</div><span>管理员</span></div>
          <button class="btn-logout">退出</button>
        </div>
      </header>

      <main class="admin-content">
        <div class="page-header">
          <h2>网站信息设置</h2>
        </div>

        <form id="settingsForm">
          <div class="settings-grid">
            <!-- 基本信息设置 -->
            <div class="settings-card">
              <h3>基本信息</h3>
              <div class="form-group">
                <label>网站名称（中文）</label>
                <input type="text" name="siteName" class="form-control">
              </div>
              <div class="form-group">
                <label>网站名称（英文）</label>
                <input type="text" name="siteNameEn" class="form-control">
              </div>
              <div class="form-group">
                <label>品牌标语</label>
                <input type="text" name="slogan" class="form-control">
              </div>
            </div>

            <!-- 联系信息 -->
            <div class="settings-card">
              <h3>联系信息</h3>
              <div class="form-group">
                <label>联系电话</label>
                <input type="text" name="phone" class="form-control">
              </div>
              <div class="form-group">
                <label>邮箱地址</label>
                <input type="text" name="email" class="form-control">
              </div>
              <div class="form-group">
                <label>WhatsApp</label>
                <input type="text" name="whatsapp" class="form-control">
              </div>
              <div class="form-group">
                <label>微信号</label>
                <input type="text" name="wechat" class="form-control">
              </div>
              <div class="form-group">
                <label>公司地址</label>
                <textarea name="address" class="form-control" rows="2"></textarea>
              </div>
            </div>

            <!-- 统计数据 -->
            <div class="settings-card">
              <h3>展示数据</h3>
              <div class="form-row">
                <div class="form-group">
                  <label>研发经验（年）</label>
                  <input type="text" name="yearsExperience" class="form-control" placeholder="如：15+">
                </div>
                <div class="form-group">
                  <label>工厂面积（㎡）</label>
                  <input type="text" name="factoryArea" class="form-control" placeholder="如：11000">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>服务国家/地区</label>
                  <input type="text" name="countries" class="form-control" placeholder="如：60+">
                </div>
                <div class="form-group">
                  <label>充放电循环</label>
                  <input type="text" name="chargeCycles" class="form-control" placeholder="如：6000+">
                </div>
              </div>
            </div>

            <!-- 认证 -->
            <div class="settings-card">
              <h3>认证证书</h3>
              <div class="form-group">
                <label>认证列表</label>
                <div class="tags-input" id="certTags">
                  <input type="text" id="certInput" placeholder="输入认证名称后按回车添加...">
                </div>
                <div class="form-hint">按回车键添加每个认证（如：CE, FCC, ISO9001）</div>
              </div>
            </div>

            <div class="settings-actions">
              <button type="submit" class="btn btn-primary">保存设置</button>
            </div>
          </div>
        </form>
      </main>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
