<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台登录 - 海西储能</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body">
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">⚡</div>
        <h1>海西储能管理后台</h1>
        <p>Haisic Admin Panel</p>
      </div>
      <form id="loginForm">
        <div id="loginError" class="login-error">用户名或密码错误，请重试</div>
        <div class="form-group">
          <label>用户名</label>
          <input type="text" name="username" class="form-control" required placeholder="请输入用户名" autocomplete="username">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" name="password" class="form-control" required placeholder="请输入密码" autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login">登录</button>
      </form>
      <div class="login-hint">
        默认账号: <code>admin</code> / 密码: <code>admin123</code>
      </div>
    </div>
  </div>
  <script src="../js/data.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
