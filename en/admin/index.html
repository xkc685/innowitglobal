<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Admin Login - InnoWit</title>
<link rel="stylesheet" href="../../css/admin.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script></head>
<body class="login-page">
<div class="login-card">
<h1>InnoWit Admin</h1><p>Sign in to manage your website</p>
<div class="form-group"><label>Username</label><input class="form-control" id="loginUser" placeholder="admin" autofocus></div>
<div class="form-group"><label>Password</label><input type="password" class="form-control" id="loginPass" placeholder="Enter password"></div>
<div id="loginError" class="text-danger small mb-3" style="display:none">Invalid credentials</div>
<button class="btn btn-primary w-100" onclick="doLogin()">Sign In</button>
<p class="text-muted small mt-3 text-center">Default: admin / admin123</p>
</div>
<script src="../../js/data.js?v=20260713b"></script><script src="../../js/admin.js?v=20260713b"></script>
<script>
function doLogin() {
  const u = document.getElementById('loginUser').value;
  const p = document.getElementById('loginPass').value;
  if (login(u, p)) {
    window.location.href = 'dashboard.html';
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body></html>
