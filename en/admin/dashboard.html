<html lang="en">

  <meta http-equiv="Expires" content="0"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Dashboard - InnoWit Admin</title>
<link rel="stylesheet" href="../../css/admin.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script></head>
<body>
<div class="admin-layout">
<aside class="admin-sidebar">
<div class="sidebar-brand"><h2>⚡ InnoWit</h2><span>Admin Panel</span></div>
<nav class="sidebar-nav">
<a href="dashboard.html" class="active"><iconify-icon icon="mdi:view-dashboard"></iconify-icon> Dashboard</a>
<a href="products.html"><iconify-icon icon="mdi:package-variant"></iconify-icon> Products</a>
<a href="messages.html"><iconify-icon icon="mdi:email"></iconify-icon> Messages</a>
<a href="settings.html"><iconify-icon icon="mdi:cog"></iconify-icon> Settings</a>
<a href="#" onclick="backupData()"><iconify-icon icon="mdi:backup-restore"></iconify-icon> Backup</a>
<a href="#" onclick="logout()"><iconify-icon icon="mdi:logout"></iconify-icon> Logout</a>
</nav></aside>
<main class="admin-main">
<header class="admin-header"><h1>Dashboard</h1><a href="../index.html" class="btn btn-sm btn-outline">View Site</a></header>
<div class="admin-content">
<div class="stats-grid">
<div class="stat-card stat-green"><div class="stat-icon">📦</div><div class="stat-value" id="statProducts">0</div><div class="stat-label">Products</div></div>
<div class="stat-card stat-blue"><div class="stat-icon">📨</div><div class="stat-value" id="statMessages">0</div><div class="stat-label">Messages</div></div>
<div class="stat-card stat-orange"><div class="stat-icon">🆕</div><div class="stat-value" id="statUnread">0</div><div class="stat-label">Unread</div></div>
<div class="stat-card stat-red"><div class="stat-icon">📝</div><div class="stat-value" id="statPosts">0</div><div class="stat-label">Blog Posts</div></div>
</div>
<div class="card"><div class="card-header"><h2>Recent Messages</h2></div><div class="card-body"><table class="table"><thead><tr><th>Name</th><th>Email</th><th>Date</th><th>Status</th></tr></thead><tbody id="recentMessages"></tbody></table></div></div>
<div class="card"><div class="card-header"><h2>Recent Products</h2></div><div class="card-body"><table class="table"><thead><tr><th>Name</th><th>Category</th><th>Price</th><th>Featured</th></tr></thead><tbody id="recentProducts"></tbody></table></div></div>
</div></main></div>
<script src="../../js/data.js?v=20260713a"></script><script src="../../js/admin.js?v=20260713a"></script>
<script>document.getElementById('statPosts').textContent = DB.getBlog().length; loadDashboard();</script>
</body></html>
