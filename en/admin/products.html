<body>

<nav class="sidebar-nav">

<main class="admin-main">

<div class="search-bar">
<input class="form-control" placeholder="Search products..." id="searchProducts" oninput="filterProducts()">
<select class="filter-select" id="filterCat" onchange="filterProducts()">

<div class="card"><div class="card-body"><table class="table"><thead><tr><th>Name</th><th>Category</th><th>Price</th><th>Capacity</th><th>Featured</th><th>Actions</th></tr></thead><tbody id="productTableBody"></tbody></table></div></div>
</div></main></div>
<div id="modalContainer"></div>
