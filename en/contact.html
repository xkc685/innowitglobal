<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Contact - InnoWit</title>

<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script></head>
<body>
<header id="header" class="fixed-top">
<div class="top-bar d-none d-lg-block"><div class="container d-flex justify-content-between py-2"><div><iconify-icon icon="mdi:phone"></iconify-icon> <span id="hdrPhone"></span> | <iconify-icon icon="mdi:email"></iconify-icon> <span id="hdrEmail"></span></div><div><a href="index.html" class="lang-link">EN</a> | <a href="../zh/index.html" class="lang-link">中文</a></div></div></div>
<nav class="navbar navbar-expand-lg"><div class="container">
<a class="navbar-brand" href="index.html"><img src="../images/main-logo.png" height="40"> <span id="brandName" class="fw-bold ms-2">InnoWit</span></a>
<button class="navbar-toggler" data-bs-toggle="offcanvas" data-bs-target="#mobileNav"><iconify-icon icon="mdi:menu" width="28"></iconify-icon></button>
<div class="collapse navbar-collapse"><ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li><li class="nav-item"><a class="nav-link" href="about.html">About</a></li>

</ul><a href="shop/cart.html" class="btn btn-outline-primary ms-3"><iconify-icon icon="mdi:cart"></iconify-icon> <span id="cartCount">0</span></a></div></div></nav>
</header>

<section class="page-banner"><div class="container"><h1>Contact Us</h1><p>Get in touch for product inquiries, distributor partnerships, or technical support</p><div class="breadcrumb"><a href="index.html">Home</a> <span>/</span> <span>Contact</span></div></div></section>

<section class="py-5"><div class="container"><div class="row g-5">
<div class="col-lg-5">
<h2 class="fw-bold mb-4">Get In Touch</h2>
<div class="contact-info-card"><iconify-icon icon="mdi:phone"></iconify-icon><div class="ms-3"><h6>Phone</h6><p id="contactPhone"></p></div></div>
<div class="contact-info-card"><iconify-icon icon="mdi:email"></iconify-icon><div class="ms-3"><h6>Email</h6><p id="contactEmail"></p></div></div>
<div class="contact-info-card"><iconify-icon icon="mdi:map-marker"></iconify-icon><div class="ms-3"><h6>Address</h6><p id="contactAddr"></p></div></div>
<div class="contact-info-card"><iconify-icon icon="mdi:whatsapp"></iconify-icon><div class="ms-3"><h6>WhatsApp</h6><p id="contactWA"></p></div></div>
</div>
<div class="col-lg-7">
<div class="bg-white p-4 rounded-4 shadow-sm">
<h3 class="fw-bold mb-4">Send a Message</h3>
<div class="row g-3">
<div class="col-md-6"><label class="form-label">Name *</label><input class="form-control" id="contactName"></div>
<div class="col-md-6"><label class="form-label">Email *</label><input type="email" class="form-control" id="contactEmail2"></div>
<div class="col-md-6"><label class="form-label">Phone</label><input class="form-control" id="contactPhone2"></div>
<div class="col-md-6"><label class="form-label">Subject</label><input class="form-control" id="contactSubject"></div>
<div class="col-12"><label class="form-label">Message *</label><textarea class="form-control" rows="5" id="contactMessage"></textarea></div>
<div class="col-12"><button class="btn btn-primary px-5" onclick="submitContact()">Send Message</button></div>
</div></div></div>
</div></div></section>

<footer id="footer" class="pt-5 pb-3 bg-dark text-white"><div class="container">
<div class="row g-4"><div class="col-lg-4"><h4 class="fw-bold" id="footerBrand">InnoWit</h4><p id="footerTagline"></p><p><iconify-icon icon="mdi:map-marker"></iconify-icon> <span id="footerAddr"></span></p><p><iconify-icon icon="mdi:phone"></iconify-icon> <span id="footerPhone"></span></p><p><iconify-icon icon="mdi:email"></iconify-icon> <span id="footerEmail"></span></p></div></div>
<hr class="mt-4 opacity-25"><div class="text-center opacity-50"><small>&copy; 2026 InnoWit. All rights reserved.</small></div></div></footer>
<script src="../js/jquery-1.11.0.min.js"></script><script src="../js/bootstrap.bundle.min.js"></script><script src="../js/data.js"></script><script src="../js/site.js"></script>
<script>
function submitContact() {
  const msg = {
    name: document.getElementById('contactName').value,
    email: document.getElementById('contactEmail2').value,
    phone: document.getElementById('contactPhone2').value,
    subject: document.getElementById('contactSubject').value,
    message: document.getElementById('contactMessage').value
  };
  if (!msg.name || !msg.email || !msg.message) { alert('Please fill required fields'); return; }
  DB.addMessage(msg);
  alert('Message sent! We will reply within 24 hours.');
  document.querySelectorAll('#contactName,#contactEmail2,#contactPhone2,#contactSubject,#contactMessage').forEach(el => el.value = '');
}
(function(){
  const s = DB.getSite();
  if (document.getElementById('contactPhone')) document.getElementById('contactPhone').textContent = s.phone;
  if (document.getElementById('contactEmail')) document.getElementById('contactEmail').textContent = s.email;
  if (document.getElementById('contactAddr')) document.getElementById('contactAddr').textContent = s.address;
  if (document.getElementById('contactWA')) document.getElementById('contactWA').textContent = s.whatsapp;
})();
</script>
</body></html>
